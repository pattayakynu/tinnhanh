name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION_CODE: ${{ github.run_number }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
      - name: Build mobileproxy AAR
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -e
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          mkdir -p /tmp/mpbuild && cd /tmp/mpbuild
          go mod init mpbuild
          go get golang.getoutline.org/sdk/x/mobileproxy@latest
          gomobile init
          mkdir -p "$GITHUB_WORKSPACE/app/libs"
          gomobile bind -target=android -androidapi 26 \
            -o "$GITHUB_WORKSPACE/app/libs/mobileproxy.aar" \
            golang.getoutline.org/sdk/x/mobileproxy
          echo "=== AAR built ===" && ls -la "$GITHUB_WORKSPACE/app/libs/"
      - name: Upload AAR (verify)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mobileproxy-aar
          path: app/libs/mobileproxy.aar
      - name: Cài Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.9/bin" >> "$GITHUB_PATH"
      - name: Unit test :core
        run: gradle :core:test --no-daemon --stacktrace
      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
      - name: Giải mã keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"
      - name: Build release APK (ký)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle :app:assembleRelease --no-daemon --stacktrace
          cp app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/app-release.apk"
      - name: Upload release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app-release.apk
      - name: Đăng lên GitHub Releases (repo public)
        if: ${{ env.RELEASE_TOKEN != '' }}
        uses: softprops/action-gh-release@v2
        with:
          repository: pattayakynu/tinnhanh-releases
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: v${{ github.run_number }}
          files: app-release.apk
          make_latest: true
