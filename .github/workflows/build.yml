name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
      - name: Build mobileproxy AAR
        continue-on-error: true
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -e
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          mkdir -p /tmp/mpbuild && cd /tmp/mpbuild
          go mod init mpbuild
          go get golang.getoutline.org/sdk/x/mobileproxy@latest
          gomobile init
          mkdir -p "$GITHUB_WORKSPACE/app/libs"
          gomobile bind -target=android -androidapi 26 \
            -o "$GITHUB_WORKSPACE/app/libs/mobileproxy.aar" \
            golang.getoutline.org/sdk/x/mobileproxy
          echo "=== AAR built ===" && ls -la "$GITHUB_WORKSPACE/app/libs/"
      - name: Upload AAR (verify)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mobileproxy-aar
          path: app/libs/mobileproxy.aar
      - name: Cài Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.9/bin" >> "$GITHUB_PATH"
      - name: Unit test :core
        run: gradle :core:test --no-daemon --stacktrace
      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
